        function parImpar( num ) {
            if (num %2==0) {
                return "par";

            } else {
                return "impar";
            }
        }
        function diceImpar() {
            let numero=parseInt(prompt("Dime un número"));
            let resultado=parImpar(numero);
            alert("El número " + numero + " es " + resultado);

        }
        function sumaNumeros() {
            let numero1=parseInt(prompt("Dime un número"));
            let numero2=parseInt(prompt("Dime otro número"));
            let suma=numero1+numero2;
            alert("La suma de " + numero1 + " y " + numero2 + " es " + suma) /*este codigo se ejecuta nada mas arrancar la pg, si yo quiero que se ejecute cuando el usuario lo pida tengo q meterlo dentro de una funcion*/
        }

    </script>
    <button onclick="sumaNumeros()">Suma Números</button> <!--hemos metido un botón de suma numeros que cuando el usuario haga click llamará a la funcion sumaNumeros-->
