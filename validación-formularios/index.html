<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validación de formularios</title>
    <script type="text/javascript">
        function validaFormulario() {
            var nombre = document.getElementById("nombre"); /*agarra el elemento que tiene id nombre*/
            if (nombre.value.length==0)/*si la longitud del valor del campo nombre es igual a 0, es decir está vacío*/ {
                alert("El nombre no puede estar vacío"); /*manda esta alerta y acaba*/
                return false; /*si una funcion llega a return acaba ahi, sale*/
            } 
            var edad = document.getElementById("edad");
            if (parseInt(edad.value<18)) {
                alert("La edad no puede ser menor que 18");
                return false;
            }
            alert("Datos correctos. Procedo a enviar");
            return true;
        }

    </script>
</head>
<body>
    <h1>Formulario de envío</h1>
    <form action="procesa.php" onsubmit="return validaFormulario()"> <!--para llamar a esa funcion validaFormulario, lo hacemos con onsubmit-->
      <label for="nombre">  Nombre: </label>
      <input type="text" name="nombre" id="nombre"><br>
      <label for ="edad">Edad: </label>
      <input type="text" name="edad" id="edad"><br>
      <input type="submit" name="" value="Enviar datos">
    </form>
</body>
</html>
