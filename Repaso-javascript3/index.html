<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Validación de formularios</h1>
    <form action="procesa.php" method="get" onsubmit="return validaFormulario()">
        <p>Nombre: <input type="text" id="nombre" name="nombre"></p>
        <p>Contraseña: <input type="password" id="password" name="password"></p>
        <p>Edad: <input type="number" id="edad" name="edad"></p>
        <p>Provincia: 
            <select name="provincia" id="provincia">
                <option value="ninguna">--Elija una--</option>
                <option value="ab">Albacete</option>
                <option value="cu">Cuenca</option>
                <option value="cr">Ciudad Real</option>
            </select></p>
        <p> <input type="checkbox" id="acepto" name="acepto">
            Acepto las condiciones</p>
        <input type="submit">
    </form>
    <script type="text/javascript">
        function validaFormulario() {
            let nombre=document.getElementById("nombre");
            let password=document.getElementById("password");
            let edad=document.getElementById("edad");
            let provincia=document.getElementById("provincia");
            let acepto=document.getElementById("acepto");
            if (nombre.value=="") {
                alert("El nombre no puede estar vacío");
                nombre.focus() //si da error pues se selcciona esta parte
                return false;
            }
            if (password.value.length<6) {
                alert("La contraseña debe de tener al menos 6 carácteres");
                return false;
            }
            if (edad.value<18) {
                alert("Debes ser mayor de 18 años");
                return false;
            }
            if (provincia.value=="ninguna") {
                alert("Debes elegir una provincia");
                return false;
            }
            if (acepto.checked=="false") {
                alert("Debes de aceptar las condiciones");
                return false;
            }
            //si llega hasta aqui es que cumple todas las condiciones
            return true;
        }

    </script>
</body>
</html>
